<div id="movie-container" class="grid grid-cols-2 md:grid-cols-5 gap-6 p-6 bg-black min-h-screen">
  </div>

<script>
  // JSON file se data fetch karo
  fetch('movies.json')
    .then(response => response.json())
    .then(data => {
      const container = document.getElementById('movie-container');
      data.forEach(movie => {
        container.innerHTML += `
          <div class="bg-gray-900 rounded-lg overflow-hidden border border-gray-700">
            <img src="${movie.poster}" class="w-full h-64 object-cover">
            <div class="p-3">
              <h2 class="text-white font-bold truncate">${movie.title}</h2>
              <p class="text-gray-400 text-sm">${movie.year}</p>
              <button class="mt-2 w-full bg-red-600 text-white py-1 rounded">Download</button>
            </div>
          </div>
        `;
      });
    });
</script>
