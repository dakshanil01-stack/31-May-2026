<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-5">
    <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    <script>
        fetch('movies.json').then(r => r.json()).then(data => {
            document.getElementById('grid').innerHTML = data.map(m => `
                <div class="bg-gray-900 p-2 rounded">
                    <img src="${m.poster}" class="w-full">
                    <h2 class="font-bold mt-2">${m.title}</h2>
                    <p>${m.year}</p>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
